; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc1-n16r16]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.33/platform-espressif32.zip
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r16
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv 

framework = arduino

build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=0
	-std=gnu++20
	-DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_port = COM14

lib_deps = 
	arduinogetstarted/ezButton@^1.0.6
	olikraus/U8g2@^2.36.5
	tzapu/WiFiManager@^2.0.17  ; library manualy add inside libs folder due to wrongly defined port of DNS -> variable as a byte, should be uint8_t
	https://github.com/schreibfaul1/ESP32-audioI2S.git
	ESP32Async/ESPAsyncWebServer @3.10.0
	ESP32Async/AsyncTCP @3.4.10